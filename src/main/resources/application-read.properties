# Read Service Profile
server.port=8080
spring.application.name=ticket-service-read

# Database Configuration (Read-only optimizations could be applied)
spring.datasource.url=jdbc:postgresql://db:5432/ticketdb
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging
logging.level.root=INFO
logging.level.com.example.ticketservice=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
